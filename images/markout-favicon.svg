<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="MarkOut markdown to Outlook favicon">
  <rect width="64" height="64" rx="12" fill="#1a56db"/>

  <!-- Large, thin envelope outline -->
  <rect x="5" y="9" width="54" height="46" rx="2" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linejoin="round"/>
  <path d="M7 13 L32 29 L57 13" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Markdown marker -->
  <text x="17" y="44"
        text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace"
        font-size="17"
        font-weight="800"
        fill="#FFFFFF">#</text>

  <!-- Conversion arrow -->
  <path d="M25.5 36.5 H34.5 V33.5 L40 38 L34.5 42.5 V39.5 H25.5 Z" fill="#FFFFFF"/>

  <!-- Outlook-style destination mark, simplified for tiny favicon use -->
  <rect x="40.5" y="29" width="14" height="15" rx="2" fill="#1a56db" stroke="#FFFFFF" stroke-width="1"/>
  <ellipse cx="47.5" cy="36.5" rx="4.2" ry="4.5" fill="none" stroke="#FFFFFF" stroke-width="2.2"/>
</svg>
