<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarkOut — Paste Markdown. Send formatted email.</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #f4f4f5;
      --surface:       #ffffff;
      --surface-2:     #fafafa;
      --border:        #e2e2e5;
      --border-subtle: #eeeeef;
      --text:          #1a1a1a;
      --text-muted:    #888;
      --text-faint:    #bbb;
      --accent:        #1a56db;
      --accent-hover:  #1447c7;
      --success:       #2e7d32;
      --warn:          #e65100;
      --error:         #c62828;
    }

    [data-theme="dark"] {
      --bg:            #111113;
      --surface:       #1c1c1f;
      --surface-2:     #232326;
      --border:        #38383d;
      --border-subtle: #2a2a2e;
      --text:          #ececec;
      --text-muted:    #8e8e93;
      --text-faint:    #48484c;
      --accent:        #4b8ef5;
      --accent-hover:  #6aa3ff;
      --success:       #66bb6a;
      --warn:          #ffa726;
      --error:         #ef5350;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.2s, color 0.2s;
    }

    /* ── Header ──────────────────────────────────────────── */
    header {
      position: relative;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
    }

    /* Left: brand */
    .brand {
      display: flex;
      flex-direction: column;
      justify-content: center;
      flex-shrink: 0;
      line-height: 1.2;
    }

    .brand-name {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.04em;
    }

    .brand-tagline {
      font-size: 11px;
      color: var(--text-faint);
      letter-spacing: 0.01em;
    }

    /* Center: subject pill — absolute so it stays truly centered */
    #subject-area {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      max-width: 38%;
      display: flex;
      align-items: center;
      pointer-events: none;
    }

    #subject-pill {
      display: none;
      align-items: center;
      gap: 7px;
      background: var(--accent);
      color: #fff;
      border-radius: 6px;
      padding: 5px 11px;
      max-width: 100%;
      min-width: 0;
      pointer-events: all;
    }

    #subject-pill.visible { display: flex; }

    #subject-pill.flash {
      animation: pillAppear 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes pillAppear {
      0%   { opacity: 0; transform: translateY(-6px) scale(0.95); }
      60%  { opacity: 1; transform: translateY(1px)  scale(1.02); }
      100% { opacity: 1; transform: translateY(0)    scale(1);    }
    }

    #subject-label {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.7;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #subject-value {
      font-size: 12.5px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    #copy-subject-btn {
      padding: 2px 8px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.1s;
    }

    #copy-subject-btn:hover { background: rgba(255,255,255,0.3); }

    /* Right: actions */
    .header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .subject-toggle {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      padding: 4px 8px;
    }

    .subject-toggle input[type="checkbox"] {
      width: 13px;
      height: 13px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .header-link {
      padding: 5px 10px;
      font-size: 12.5px;
      color: var(--text-muted);
      text-decoration: none;
      border-radius: 5px;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
    }

    .header-link:hover {
      background: var(--border);
      color: var(--text);
    }

    .header-sep {
      width: 1px;
      height: 20px;
      background: var(--border);
      margin: 0 2px;
      flex-shrink: 0;
    }

    #theme-btn {
      padding: 5px 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s;
    }

    #theme-btn:hover { background: var(--border); }

    #copy-btn {
      padding: 6px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, opacity 0.15s;
    }

    #copy-btn:hover { background: var(--accent-hover); }
    #copy-btn:disabled { opacity: 0.35; cursor: default; }

    /* ── Workspace ───────────────────────────────────────── */
    .workspace { flex: 1; display: flex; overflow: hidden; }

    .pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--surface);
      transition: background 0.2s;
    }

    .pane + .pane { border-left: 1px solid var(--border); }

    .pane-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-faint);
      padding: 6px 18px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    textarea {
      flex: 1;
      width: 100%;
      padding: 18px;
      border: none;
      outline: none;
      font-family: ui-monospace, 'Cascadia Code', 'Consolas', monospace;
      font-size: 13.5px;
      line-height: 1.65;
      resize: none;
      color: var(--text);
      background: var(--surface);
      transition: background 0.2s, color 0.2s;
    }

    textarea::placeholder { color: var(--text-faint); }

    .preview-wrap { flex: 1; overflow-y: auto; padding: 18px 22px; }

    .preview-wrap .empty-hint { color: var(--text-faint); font-size: 13px; }

    .preview-wrap h1,.preview-wrap h2,.preview-wrap h3,
    .preview-wrap h4,.preview-wrap h5,.preview-wrap h6 {
      margin: 1em 0 0.4em; font-weight: 600; line-height: 1.3; color: var(--text);
    }
    .preview-wrap h1 { font-size: 1.7em; }
    .preview-wrap h2 { font-size: 1.35em; }
    .preview-wrap h3 { font-size: 1.15em; }
    .preview-wrap h1:first-child,.preview-wrap h2:first-child,.preview-wrap h3:first-child { margin-top: 0; }
    .preview-wrap p { margin: 0.55em 0; color: var(--text); font-size: 14px; line-height: 1.65; }
    .preview-wrap ul,.preview-wrap ol { margin: 0.5em 0; padding-left: 22px; }
    .preview-wrap li { margin: 0.2em 0; font-size: 14px; color: var(--text); line-height: 1.65; }
    .preview-wrap strong { font-weight: 600; }
    .preview-wrap em { font-style: italic; }
    .preview-wrap code {
      background: var(--surface-2); padding: 1px 5px; border-radius: 3px;
      font-family: ui-monospace,'Consolas',monospace; font-size: 0.88em; color: #d63384;
    }
    [data-theme="dark"] .preview-wrap code { color: #f472b6; }
    .preview-wrap pre {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 5px; padding: 12px 16px; overflow-x: auto; margin: 0.8em 0;
    }
    .preview-wrap pre code { background: none; padding: 0; color: var(--text); font-size: 13px; }
    .preview-wrap blockquote {
      border-left: 3px solid var(--border); margin: 0.7em 0;
      padding: 2px 0 2px 16px; color: var(--text-muted);
    }
    .preview-wrap table { border-collapse: collapse; margin: 0.8em 0; font-size: 14px; width: 100%; }
    .preview-wrap th,.preview-wrap td { border: 1px solid var(--border); padding: 6px 12px; text-align: left; }
    .preview-wrap th { background: var(--surface-2); font-weight: 600; }
    .preview-wrap hr { border: none; border-top: 1px solid var(--border); margin: 1.2em 0; }
    .preview-wrap a { color: var(--accent); text-decoration: underline; }

    /* ── Status bar ──────────────────────────────────────── */
    .status-bar {
      height: 28px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; background: var(--surface-2); border-top: 1px solid var(--border);
      flex-shrink: 0; font-size: 11.5px; color: var(--text-faint);
    }

    #status-msg { transition: color 0.2s; }
    #status-msg.success { color: var(--success); font-weight: 500; }
    #status-msg.warn    { color: var(--warn); }
    #status-msg.error   { color: var(--error); }

    /* ── Toast ───────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 44px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      padding: 9px 18px; border-radius: 6px; font-size: 13px; font-weight: 500;
      color: #fff; opacity: 0; transition: opacity 0.18s, transform 0.18s;
      pointer-events: none; z-index: 200; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { background: var(--success); }
    #toast.warn    { background: var(--warn); }
    #toast.error   { background: var(--error); }
  </style>
</head>
<body>

<header>
  <!-- Left: brand -->
  <div class="brand">
    <div class="brand-name">MarkOut</div>
    <div class="brand-tagline">Paste Markdown. Send formatted email.</div>
  </div>

  <!-- Center: subject pill -->
  <div id="subject-area">
    <div id="subject-pill">
      <span id="subject-label">Subject</span>
      <span id="subject-value"></span>
      <button id="copy-subject-btn">Copy</button>
    </div>
  </div>

  <!-- Right: actions -->
  <div class="header-actions">
    <label class="subject-toggle">
      <input type="checkbox" id="remove-subject-cb">
      Separate subject
    </label>
    <div class="header-sep"></div>
    <a href="/faq.html" target="_blank" class="header-link">FAQ</a>
    <a href="https://github.com/jonwadsworth/MarkOut" target="_blank" class="header-link">GitHub</a>
    <button id="theme-btn">Dark</button>
    <div class="header-sep"></div>
    <button id="copy-btn" disabled>Copy rich text</button>
  </div>
</header>

<div class="workspace">
  <div class="pane">
    <div class="pane-label">Markdown</div>
    <textarea id="input" placeholder="Paste your Markdown here&#x2026;" spellcheck="false"></textarea>
  </div>
  <div class="pane">
    <div class="pane-label">Preview</div>
    <div id="preview" class="preview-wrap">
      <span class="empty-hint">Preview appears here after you paste</span>
    </div>
  </div>
</div>

<div class="status-bar">
  <span id="status-msg">Ready — paste Markdown or an email with a Subject: line</span>
  <span id="word-count"></span>
</div>

<div id="toast"></div>

<script>
  var inputEl        = document.getElementById('input');
  var previewEl      = document.getElementById('preview');
  var statusEl       = document.getElementById('status-msg');
  var countEl        = document.getElementById('word-count');
  var copyBtn        = document.getElementById('copy-btn');
  var toastEl        = document.getElementById('toast');
  var removeCb       = document.getElementById('remove-subject-cb');
  var subjectPill    = document.getElementById('subject-pill');
  var subjectValueEl = document.getElementById('subject-value');
  var copySubjectBtn = document.getElementById('copy-subject-btn');
  var themeBtn       = document.getElementById('theme-btn');

  var LS_SUBJECT = 'markout_remove_subject';
  var LS_THEME   = 'markout_theme';

  marked.setOptions({ breaks: true, gfm: true });

  // ── Theme ─────────────────────────────────────────────
  var isDark = localStorage.getItem(LS_THEME) === 'dark';
  function applyTheme(dark) {
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    themeBtn.textContent = dark ? 'Light' : 'Dark';
  }
  applyTheme(isDark);
  themeBtn.addEventListener('click', function () {
    isDark = !isDark;
    localStorage.setItem(LS_THEME, isDark ? 'dark' : 'light');
    applyTheme(isDark);
  });

  // ── Subject preference ────────────────────────────────
  removeCb.checked = localStorage.getItem(LS_SUBJECT) === '1';
  removeCb.addEventListener('change', function () {
    localStorage.setItem(LS_SUBJECT, removeCb.checked ? '1' : '0');
    if (!removeCb.checked) setSubject(null);
    render(inputEl.value);
  });

  // ── Markdown detection ────────────────────────────────
  var MD_PATTERNS = [
    /^#{1,6}\s/m, /\*\*[^*\n]+\*\*/, /\*[^*\n]+\*/, /__[^_\n]+__/,
    /^[\-\*\+]\s/m, /^\d+\.\s/m, /`[^`\n]+`/, /^```/m,
    /^\[.+\]\(.+\)/m, /^>\s/m, /\|.+\|/, /^---+\s*$/m,
  ];
  function isMarkdown(text) { return MD_PATTERNS.some(function(p){ return p.test(text); }); }

  // ── Subject extraction ────────────────────────────────
  function extractSubject(text) {
    var lines = text.split('\n');
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      if (!line.trim()) continue;
      var m = line.match(/^#{1,3}\s+(.+)/) || line.match(/^subject:\s*(.+)/i);
      if (m) return m[1].trim();
      break;
    }
    return null;
  }

  function stripSubjectLine(text) {
    return text.replace(/^([ \t]*\n)*(#{1,3} [^\n]+|subject:[^\n]+)\n?(\n)*/i, '').trimStart();
  }

  // ── Subject display ───────────────────────────────────
  var currentSubject = null;
  var flashTimer;
  function setSubject(subject) {
    currentSubject = subject;
    if (subject) {
      subjectValueEl.textContent = subject;
      subjectPill.classList.add('visible');
      subjectPill.classList.remove('flash');
      clearTimeout(flashTimer);
      void subjectPill.offsetWidth;
      subjectPill.classList.add('flash');
      flashTimer = setTimeout(function(){ subjectPill.classList.remove('flash'); }, 700);
    } else {
      subjectPill.classList.remove('visible', 'flash');
      subjectValueEl.textContent = '';
    }
  }

  copySubjectBtn.addEventListener('click', function () {
    if (!currentSubject) return;
    navigator.clipboard.writeText(currentSubject).then(function () {
      showToast('Subject copied ✓', 'success', 1800);
    }).catch(function () { showToast('Copy failed', 'error', 2500); });
  });

  // ── Toast ─────────────────────────────────────────────
  var toastTimer2;
  function showToast(msg, type, ms) {
    toastEl.textContent = msg;
    toastEl.className = 'show ' + (type || 'success');
    clearTimeout(toastTimer2);
    toastTimer2 = setTimeout(function(){ toastEl.className = ''; }, ms || 2400);
  }

  function setStatus(msg, type) { statusEl.textContent = msg; statusEl.className = type || ''; }

  // ── Clipboard ─────────────────────────────────────────
  async function copyAsRichText(html, plain) {
    var item = new ClipboardItem({
      'text/html':  new Blob([html],  { type: 'text/html'  }),
      'text/plain': new Blob([plain], { type: 'text/plain' })
    });
    await navigator.clipboard.write([item]);
  }

  // ── Render ────────────────────────────────────────────
  var lastHtml = '', lastPlain = '';

  function render(text) {
    if (!text.trim()) {
      previewEl.innerHTML = '<span class="empty-hint">Preview appears here after you paste</span>';
      copyBtn.disabled = true; lastHtml = ''; lastPlain = '';
      countEl.textContent = '';
      setStatus('Ready — paste Markdown or an email with a Subject: line');
      if (removeCb.checked) setSubject(null);
      return;
    }

    var words = text.trim().split(/\s+/).filter(Boolean).length;
    countEl.textContent = words + ' word' + (words === 1 ? '' : 's');

    var bodyText = text, hasSubject = false;
    if (removeCb.checked) {
      var subject = extractSubject(text);
      setSubject(subject);
      if (subject) { hasSubject = true; bodyText = stripSubjectLine(text); }
    }

    if (!hasSubject && !isMarkdown(text)) {
      previewEl.innerHTML = '<span class="empty-hint">No Markdown detected</span>';
      copyBtn.disabled = true; lastHtml = ''; lastPlain = '';
      setStatus('No Markdown syntax found', 'warn');
      return;
    }

    lastHtml = marked.parse(bodyText); lastPlain = bodyText;
    previewEl.innerHTML = lastHtml;
    copyBtn.disabled = false;
  }

  async function doCopy() {
    if (!lastHtml) return;
    try {
      await copyAsRichText(lastHtml, lastPlain);
      setStatus('Rich text copied — paste into Outlook', 'success');
      showToast('Copied as rich text ✓');
    } catch (err) {
      setStatus('Clipboard blocked — check browser permissions', 'error');
      showToast('Copy failed — check permissions', 'error', 3500);
    }
  }

  inputEl.addEventListener('paste', function () {
    setTimeout(async function () { render(inputEl.value); if (lastHtml) await doCopy(); }, 0);
  });
  inputEl.addEventListener('input', function () { render(inputEl.value); });
  copyBtn.addEventListener('click', doCopy);
</script>
</body>
</html>
