<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markout</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Subject strip (top of page) ────────────────────── */
    .subject-strip {
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      padding: 0 16px;
      height: 38px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .subject-strip label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12.5px;
      color: #555;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    .subject-strip input[type="checkbox"] {
      width: 14px;
      height: 14px;
      cursor: pointer;
      accent-color: #1a56db;
    }

    .subject-divider {
      width: 1px;
      height: 18px;
      background: #ddd;
      flex-shrink: 0;
    }

    #subject-box {
      display: none;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    #subject-box.visible { display: flex; }

    .subject-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #bbb;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #subject-text {
      flex: 1;
      min-width: 0;
      font-size: 13px;
      color: #222;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #subject-text.empty { color: #ccc; font-style: italic; }

    #copy-subject-btn {
      padding: 3px 10px;
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 11.5px;
      color: #555;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.12s;
    }

    #copy-subject-btn:hover { background: #e4e4e4; }
    #copy-subject-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Header ─────────────────────────────────────────── */
    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 0 20px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .brand h1 {
      font-size: 16px;
      font-weight: 700;
      color: #111;
      letter-spacing: -0.02em;
    }

    .brand .tagline {
      font-size: 12px;
      color: #aaa;
    }

    #copy-btn {
      padding: 6px 14px;
      background: #1a56db;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    #copy-btn:hover { background: #1447c7; }
    #copy-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Workspace ───────────────────────────────────────── */
    .workspace {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #fff;
    }

    .pane + .pane {
      border-left: 1px solid #e0e0e0;
    }

    .pane-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #bbb;
      padding: 6px 18px;
      background: #fafafa;
      border-bottom: 1px solid #efefef;
      flex-shrink: 0;
    }

    textarea {
      flex: 1;
      width: 100%;
      padding: 18px;
      border: none;
      outline: none;
      font-family: ui-monospace, 'Cascadia Code', 'Consolas', monospace;
      font-size: 13.5px;
      line-height: 1.65;
      resize: none;
      color: #222;
      background: #fff;
    }

    textarea::placeholder { color: #ccc; }

    .preview-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 18px 22px;
    }

    /* ── Preview typography ──────────────────────────────── */
    .preview-wrap .empty-hint {
      color: #ccc;
      font-size: 13px;
    }

    .preview-wrap h1,
    .preview-wrap h2,
    .preview-wrap h3,
    .preview-wrap h4,
    .preview-wrap h5,
    .preview-wrap h6 {
      margin: 1em 0 0.4em;
      font-weight: 600;
      line-height: 1.3;
      color: #111;
    }
    .preview-wrap h1 { font-size: 1.7em; }
    .preview-wrap h2 { font-size: 1.35em; }
    .preview-wrap h3 { font-size: 1.15em; }
    .preview-wrap h1:first-child,
    .preview-wrap h2:first-child,
    .preview-wrap h3:first-child { margin-top: 0; }

    .preview-wrap p { margin: 0.55em 0; color: #333; font-size: 14px; line-height: 1.65; }
    .preview-wrap ul,
    .preview-wrap ol { margin: 0.5em 0; padding-left: 22px; }
    .preview-wrap li { margin: 0.2em 0; font-size: 14px; color: #333; line-height: 1.65; }
    .preview-wrap li + li { margin-top: 0.15em; }

    .preview-wrap strong { font-weight: 600; }
    .preview-wrap em { font-style: italic; }

    .preview-wrap code {
      background: #f0f0f0;
      padding: 1px 5px;
      border-radius: 3px;
      font-family: ui-monospace, 'Consolas', monospace;
      font-size: 0.88em;
      color: #d63384;
    }

    .preview-wrap pre {
      background: #f6f8fa;
      border: 1px solid #e8e8e8;
      border-radius: 5px;
      padding: 12px 16px;
      overflow-x: auto;
      margin: 0.8em 0;
    }

    .preview-wrap pre code {
      background: none;
      padding: 0;
      color: #222;
      font-size: 13px;
    }

    .preview-wrap blockquote {
      border-left: 3px solid #d0d0d0;
      margin: 0.7em 0;
      padding: 2px 0 2px 16px;
      color: #666;
    }

    .preview-wrap table {
      border-collapse: collapse;
      margin: 0.8em 0;
      font-size: 14px;
      width: 100%;
    }

    .preview-wrap th,
    .preview-wrap td {
      border: 1px solid #ddd;
      padding: 6px 12px;
      text-align: left;
    }

    .preview-wrap th {
      background: #f5f5f5;
      font-weight: 600;
      color: #222;
    }

    .preview-wrap hr {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 1.2em 0;
    }

    .preview-wrap a { color: #1a56db; text-decoration: underline; }

    /* ── Status bar ──────────────────────────────────────── */
    .status-bar {
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: #fafafa;
      border-top: 1px solid #e0e0e0;
      flex-shrink: 0;
      font-size: 11.5px;
      color: #aaa;
    }

    #status-msg { transition: color 0.2s; }
    #status-msg.success { color: #2e7d32; font-weight: 500; }
    #status-msg.warn    { color: #e65100; }
    #status-msg.error   { color: #c62828; }

    /* ── Toast ───────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 44px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      padding: 9px 18px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      color: #fff;
      opacity: 0;
      transition: opacity 0.18s ease, transform 0.18s ease;
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #toast.success { background: #2e7d32; }
    #toast.warn    { background: #e65100; }
    #toast.error   { background: #c62828; }
  </style>
</head>
<body>

<!-- ── Subject strip ── -->
<div class="subject-strip">
  <label>
    <input type="checkbox" id="remove-subject-cb">
    Separate subject line
  </label>
  <div class="subject-divider" id="subject-divider" style="display:none"></div>
  <div id="subject-box">
    <span class="subject-label">Subject</span>
    <span id="subject-text" class="empty">none detected</span>
    <button id="copy-subject-btn" disabled>Copy</button>
  </div>
</div>

<!-- ── Header ── -->
<header>
  <div class="brand">
    <h1>Markout</h1>
    <span class="tagline">Paste Markdown — paste rich text into Outlook</span>
  </div>
  <button id="copy-btn" disabled>Copy rich text</button>
</header>

<!-- ── Workspace ── -->
<div class="workspace">
  <div class="pane">
    <div class="pane-label">Markdown</div>
    <textarea id="input" placeholder="Paste your Markdown here&#x2026;" spellcheck="false"></textarea>
  </div>
  <div class="pane">
    <div class="pane-label">Preview</div>
    <div id="preview" class="preview-wrap">
      <span class="empty-hint">Preview appears here after you paste</span>
    </div>
  </div>
</div>

<div class="status-bar">
  <span id="status-msg">Ready</span>
  <span id="word-count"></span>
</div>

<div id="toast"></div>

<script>
  const inputEl       = document.getElementById('input');
  const previewEl     = document.getElementById('preview');
  const statusEl      = document.getElementById('status-msg');
  const countEl       = document.getElementById('word-count');
  const copyBtn       = document.getElementById('copy-btn');
  const toastEl       = document.getElementById('toast');
  const removeCb      = document.getElementById('remove-subject-cb');
  const subjectBox    = document.getElementById('subject-box');
  const subjectText   = document.getElementById('subject-text');
  const copySubjectBtn = document.getElementById('copy-subject-btn');
  const subjectDivider = document.getElementById('subject-divider');

  const LS_KEY = 'markout_remove_subject';

  marked.setOptions({ breaks: true, gfm: true });

  // ── Restore preference ────────────────────────────────
  removeCb.checked = localStorage.getItem(LS_KEY) === '1';
  updateSubjectUI();

  removeCb.addEventListener('change', function() {
    localStorage.setItem(LS_KEY, removeCb.checked ? '1' : '0');
    updateSubjectUI();
    // Re-render with the current content so the preview reflects the change
    render(inputEl.value);
  });

  function updateSubjectUI() {
    var show = removeCb.checked;
    subjectBox.classList.toggle('visible', show);
    subjectDivider.style.display = show ? '' : 'none';
  }

  // ── Markdown detection ────────────────────────────────
  const MD_PATTERNS = [
    /^#{1,6}\s/m,
    /\*\*[^*\n]+\*\*/,
    /\*[^*\n]+\*/,
    /__[^_\n]+__/,
    /^[\-\*\+]\s/m,
    /^\d+\.\s/m,
    /`[^`\n]+`/,
    /^```/m,
    /^\[.+\]\(.+\)/m,
    /^>\s/m,
    /\|.+\|/,
    /^---+\s*$/m,
  ];

  function isMarkdown(text) {
    return MD_PATTERNS.some(function(p) { return p.test(text); });
  }

  // ── Subject extraction ────────────────────────────────
  // Detects a heading on the very first non-empty line only.
  function extractSubject(text) {
    var lines = text.split('\n');
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      if (!line.trim()) continue;
      var m = line.match(/^#{1,3}\s+(.+)/);
      if (m) return m[1].trim();
      break; // first non-empty line is not a heading
    }
    return null;
  }

  // Returns the text with the subject line (and any immediately following
  // blank lines) removed.
  function stripSubjectLine(text) {
    return text.replace(/^([ \t]*\n)*#{1,3} [^\n]+\n?(\n)*/, '').trimStart();
  }

  // ── Subject display ───────────────────────────────────
  var currentSubject = null;

  function setSubject(subject) {
    currentSubject = subject;
    if (subject) {
      subjectText.textContent = subject;
      subjectText.classList.remove('empty');
      copySubjectBtn.disabled = false;
    } else {
      subjectText.textContent = 'none detected';
      subjectText.classList.add('empty');
      copySubjectBtn.disabled = true;
    }
  }

  copySubjectBtn.addEventListener('click', function() {
    if (!currentSubject) return;
    navigator.clipboard.writeText(currentSubject).then(function() {
      showToast('Subject copied ✓', 'success', 1800);
    }).catch(function() {
      showToast('Copy failed', 'error', 2500);
    });
  });

  // ── Toast ─────────────────────────────────────────────
  var toastTimer;
  function showToast(msg, type, ms) {
    type = type || 'success';
    ms = ms || 2400;
    toastEl.textContent = msg;
    toastEl.className = 'show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { toastEl.className = ''; }, ms);
  }

  // ── Status ────────────────────────────────────────────
  function setStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = type || '';
  }

  // ── Clipboard ─────────────────────────────────────────
  async function copyAsRichText(html, plainText) {
    var htmlBlob  = new Blob([html],      { type: 'text/html'  });
    var textBlob  = new Blob([plainText], { type: 'text/plain' });
    var item = new ClipboardItem({ 'text/html': htmlBlob, 'text/plain': textBlob });
    await navigator.clipboard.write([item]);
  }

  // ── Render + copy ──────────────────────────────────────
  var lastHtml      = '';
  var lastPlainText = '';

  function render(text) {
    if (!text.trim()) {
      previewEl.innerHTML = '<span class="empty-hint">Preview appears here after you paste</span>';
      copyBtn.disabled = true;
      lastHtml = '';
      lastPlainText = '';
      countEl.textContent = '';
      setStatus('Ready');
      if (removeCb.checked) setSubject(null);
      return;
    }

    var words = text.trim().split(/\s+/).filter(Boolean).length;
    countEl.textContent = words + ' word' + (words === 1 ? '' : 's');

    if (!isMarkdown(text)) {
      previewEl.innerHTML = '<span class="empty-hint">No Markdown detected</span>';
      copyBtn.disabled = true;
      lastHtml = '';
      lastPlainText = '';
      setStatus('No Markdown syntax found', 'warn');
      if (removeCb.checked) setSubject(null);
      return;
    }

    // Subject handling
    var bodyText = text;
    if (removeCb.checked) {
      var subject = extractSubject(text);
      setSubject(subject);
      if (subject) {
        bodyText = stripSubjectLine(text);
      }
    }

    lastHtml      = marked.parse(bodyText);
    lastPlainText = bodyText;
    previewEl.innerHTML = lastHtml;
    copyBtn.disabled = false;
  }

  async function doCopy() {
    if (!lastHtml) return;
    try {
      await copyAsRichText(lastHtml, lastPlainText);
      setStatus('Rich text copied — paste into Outlook', 'success');
      showToast('Copied as rich text ✓');
    } catch (err) {
      setStatus('Clipboard blocked — check browser permissions', 'error');
      showToast('Copy failed — check permissions', 'error', 3500);
    }
  }

  inputEl.addEventListener('paste', function() {
    setTimeout(async function() {
      render(inputEl.value);
      if (lastHtml) await doCopy();
    }, 0);
  });

  inputEl.addEventListener('input', function() { render(inputEl.value); });

  copyBtn.addEventListener('click', doCopy);
</script>

</body>
</html>
